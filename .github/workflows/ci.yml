name: CI

# Continuous Integration for the NEXLI web app (P1-21).
# Runs on every push and PR to the main / master branches.
#
# NOTE: deployment is intentionally NOT part of this workflow. Releases are a
# deliberate, manual step (`npm run deploy` / `firebase deploy` from a trusted
# machine with the right project + credentials), so an accidental merge can never
# push to production. CI only proves the tree is green.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# The web app (and all npm scripts) live under Web/.
defaults:
  run:
    working-directory: Web

jobs:
  build-test:
    name: Typecheck, unit tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

  rules-test:
    name: Firestore security-rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Web/package-lock.json

      # The Firestore emulator runs on the JVM (Temurin 21).
      - name: Set up Java (for the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # `test:rules` boots the Firestore emulator and runs test/rules.test.mjs
      # against it (emulators:exec tears the emulator down afterwards).
      - name: Run rules tests against the Firestore emulator
        run: npm run test:rules
